gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html ar.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Origin "*";

    # الصفحة الرئيسية
    location = / {
        try_files /ar.html =404;
    }

    # مجلدات الصفحات العربية والإنجليزية
    location ~ ^/(ar|en)(/.*)?$ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ملفات الوسائط والصور - cache طويل
    location /storage/ {
        alias /usr/share/nginx/html/storage/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    location /img/ {
        alias /usr/share/nginx/html/img/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /css/ {
        alias /usr/share/nginx/html/css/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /usr/share/nginx/html/js/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # أنواع الملفات الثابتة
    location ~* \.(png|jpg|jpeg|gif|ico|svg|svgz|webp|bmp|tiff|mp4|mp3|webm|pdf|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # fallback عام
    location / {
        try_files $uri $uri/ $uri/index.html /ar.html;
    }
}
