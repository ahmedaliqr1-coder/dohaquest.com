server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index ar.html index.html;

    location / {
        try_files $uri $uri/ /ar.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
