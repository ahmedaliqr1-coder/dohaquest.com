server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index ar.html index.html;

    add_header Access-Control-Allow-Origin "*";

    location / {
        try_files $uri $uri/ /ar.html;
    }

    location /storage/ {
        alias /usr/share/nginx/html/storage/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    location /img/ {
        alias /usr/share/nginx/html/img/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|svgz|webp|bmp|tiff|mp4|mp3|webm|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
}
