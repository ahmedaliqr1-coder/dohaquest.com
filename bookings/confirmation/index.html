<script>
document.addEventListener('DOMContentLoaded', function() {
    var order = JSON.parse(localStorage.getItem('dq_order') || 'null');
    
    if (!order) {
        document.getElementById('order-details').innerHTML = '<p style="color:#666;">No order information found.</p>';
        return;
    }
    
    // عرض معلومات الطلب
    var orderInfo = document.getElementById('order-info');
    if (orderInfo) {
        orderInfo.innerHTML = 
            '<div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">' +
            '<div><span style="color:#9ca3af; font-size:13px; display:block;">Order Number</span><strong style="color:#1a1a2e;">' + (order.orderNum || 'N/A') + '</strong></div>' +
            '<div><span style="color:#9ca3af; font-size:13px; display:block;">Order Date</span><strong style="color:#1a1a2e;">' + (order.orderDate || 'N/A') + '</strong></div>' +
            '<div><span style="color:#9ca3af; font-size:13px; display:block;">Name</span><strong style="color:#1a1a2e;">' + (order.name || 'N/A') + '</strong></div>' +
            '<div><span style="color:#9ca3af; font-size:13px; display:block;">Email</span><strong style="color:#1a1a2e;">' + (order.email || 'N/A') + '</strong></div>' +
            '<div><span style="color:#9ca3af; font-size:13px; display:block;">Visit Date</span><strong style="color:#1a1a2e;">' + (order.date || 'N/A') + '</strong></div>' +
            '<div><span style="color:#9ca3af; font-size:13px; display:block;">Total Paid</span><strong style="color:#6b21a8; font-size:18px;">QAR ' + (order.total ? order.total.toFixed(2) : '0.00') + '</strong></div>' +
            '</div>';
    }
    
    // عرض التذاكر
    var ticketsContent = document.getElementById('tickets-content');
    if (ticketsContent && order.items && order.items.length > 0) {
        var html = '<table style="width:100%; border-collapse:collapse;">' +
            '<thead><tr style="border-bottom:2px solid #e5e7eb;">' +
            '<th style="text-align:left; padding:10px 0; color:#6b7280; font-weight:500;">Ticket</th>' +
            '<th style="text-align:center; padding:10px 0; color:#6b7280; font-weight:500;">Qty</th>' +
            '<th style="text-align:right; padding:10px 0; color:#6b7280; font-weight:500;">Price</th>' +
            '</tr></thead><tbody>';
        
        order.items.forEach(function(item) {
            html += '<tr style="border-bottom:1px solid #f3f4f6;">' +
                '<td style="padding:12px 0; color:#374151;">' + item.name + '</td>' +
                '<td style="padding:12px 0; text-align:center; color:#374151;">×' + item.qty + '</td>' +
                '<td style="padding:12px 0; text-align:right; color:#374151;">QAR ' + (item.price * item.qty).toFixed(2) + '</td>' +
                '</tr>';
        });
        
        html += '<tr><td colspan="2" style="padding:15px 0; font-weight:700; color:#1a1a2e;">Total</td>' +
            '<td style="padding:15px 0; text-align:right; font-weight:700; color:#6b21a8; font-size:18px;">QAR ' + order.total.toFixed(2) + '</td></tr>';
        html += '</tbody></table>';
        ticketsContent.innerHTML = html;
    }
    
    // مسح السلة بعد التأكيد
    localStorage.removeItem('dq_cart');
});
</script>
